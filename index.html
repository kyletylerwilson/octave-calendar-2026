<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
:root { --primary: #6366f1; --text: #1e293b; }
    
    /* Center everything and ensure it doesn't overflow horizontally */
    body { 
        font-family: 'Inter', sans-serif; 
        color: var(--text); 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 20px; /* Reduced from 40px for mobile */
        margin: 0;
        background: #f8fafc;
    }

    .logo-container {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-bottom: 10px;
    }

    .calendar-logo {
        max-width: 150px; /* Slightly smaller for better fit */
        height: auto;
    }

    /* THE CALENDAR - Made Width Flexible */
    .calendar { 
        width: 100%; 
        max-width: 400px; /* Won't go wider than this, but will shrink */
        background: #fff; 
        border-radius: 16px; 
        box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
        border: 1px solid #e2e8f0; 
        margin-top: 40px; 
    }

    .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: white; border-bottom: 1px solid #f1f5f9; }
    .header h3 { margin: 0; font-size: 1.1rem; letter-spacing: -0.02em; }
    
    .nav-btn { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: 0.2s; }

    .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.75rem; font-weight: 600; color: #94a3b8; padding: 10px 0; text-transform: uppercase; }
    
    .days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding: 0 5px 10px 5px; }
    
    .day { 
        padding: 15px 0; 
        font-size: 0.95rem; 
        position: relative; 
        border-bottom: 1px solid #f8fafc; 
        color: #475569; 
        cursor: default;
    }

    .today { color: var(--primary); font-weight: 800; background: #eef2ff; border-radius: 8px; }

    /* TOOLTIP LOGIC */
    .day.has-event { color: white !important; font-weight: bold; border-radius: 8px; cursor: pointer; }
    
    .has-event:hover::before {
        content: attr(data-event);
        position: absolute;
        bottom: 110%;
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: white;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 0.75rem;
        white-space: nowrap;
        z-index: 999;
    }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 450px) {
        .calendar { width: 95vw; margin-top: 30px; }
        .day { padding: 12px 0; font-size: 0.85rem; }
        .header h3 { font-size: 1rem; }
        .nav-btn { padding: 6px 10px; }
        
        /* Stop tooltips from going off-screen on mobile */
        .has-event:hover::before {
            white-space: normal;
            width: 120px;
            font-size: 0.7rem;
        }
    }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="Favicon.png" alt="Music Shop Logo" class="calendar-logo">
    </div>    

<div class="calendar">
    <div class="header">
        <button class="nav-btn" id="prev">&lt;</button>
        <h3 id="monthDisplay"></h3>
        <button class="nav-btn" id="next">&gt;</button>
    </div>
    <div class="weekdays">
        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div id="daysContainer" class="days"></div>
</div>

<script>
    // --- EDIT YOUR EVENTS HERE ---
    const events = {
    "6/15/2025": { text: "End of Year Recital 🏖️", color: "#10b981" }, // Green
    "10/26/2025": { text: "Halloween Benefit Recital 🎃", color: "#f59e0b" },
    "12/14/2025": { text: "Winter Recital ☃️", color: "#6366f1" }, // Indigo
    "12/25/2025": { text: "Christmas Day 🎄", color: "#ef4444" } // Orange
    };

    const daysContainer = document.getElementById('daysContainer');
    const monthDisplay = document.getElementById('monthDisplay');
    let nav = 0;

    function load() {
        const dt = new Date();
        if (nav !== 0) dt.setMonth(dt.getMonth() + nav);

        const month = dt.getMonth();
        const year = dt.getFullYear();

        // RELIABLE START DAY CALCULATION
        const firstDayOfMonth = new Date(year, month, 1);
        const paddingDays = firstDayOfMonth.getDay(); // Returns 0 for Sun, 1 for Mon, etc.
        
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        monthDisplay.innerText = `${dt.toLocaleDateString('en-us', { month: 'long' })} ${year}`;
        daysContainer.innerHTML = '';

        // 1. Add Padding Days
        for (let i = 0; i < paddingDays; i++) {
            const paddingSquare = document.createElement('div');
            paddingSquare.classList.add('day');
            paddingSquare.style.visibility = 'hidden';
            daysContainer.appendChild(paddingSquare);
        }

        // 2. Add Actual Days
        for (let i = 1; i <= daysInMonth; i++) {
            const daySquare = document.createElement('div');
            daySquare.classList.add('day');
            daySquare.innerText = i;

            const dayString = `${month + 1}/${i}/${year}`;

            // Highlight Today
            const today = new Date();
            if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                daySquare.classList.add('today');
            }

            // Add Event
            if (events[dayString]) {
                const eventData = events[dayString];
                daySquare.classList.add('has-event');

                // Apply the specific color to the background
                daySquare.style.backgroundColor = eventData.color;

                // Set the hover text
                daySquare.setAttribute('data-event', eventData.text);
            }

            daysContainer.appendChild(daySquare);
        }
    }

    document.getElementById('next').addEventListener('click', () => { nav++; load(); });
    document.getElementById('prev').addEventListener('click', () => { nav--; load(); });

    load();
</script>


</body>
</html>
